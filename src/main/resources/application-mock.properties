spring.application.name=lucy-lms-mock

spring.datasource.url=jdbc:h2:mem:lucy_mock;DB_CLOSE_DELAY=-1;MODE=MSSQLServer
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.port=8081

openrouter.api.key=${OPENROUTER_API_KEY:}
openrouter.model=${OPENROUTER_MODEL:openrouter/auto}
lucy.mock-data.enabled=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${LUCY_MAIL_USERNAME:}
spring.mail.password=${LUCY_MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
lucy.admin.email=
